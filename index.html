<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- Fonts: Satoshi (Display) + DM Sans (UI) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
    rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,800,900&display=swap" rel="stylesheet">

  <meta name="description"
    content="COPYBETPRO — Sistema de Trading Profissional. Copie estratégias de traders profissionais na Betfair com automação inteligente." />
  <meta name="theme-color" content="#0B1120" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/sigatrader-icon.svg" />
  <title>COPYBETPRO — Trading Profissional</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <!-- BetChat Widget -->
  <script>
    (function() {
      var iframe = document.createElement('iframe');
      iframe.src = 'https://joy-whisper-weave.lovable.app/widget-preview/eb55f03e-9fef-4d92-b9aa-c6d6e3462df8';
      iframe.id = 'betchat-widget-iframe';
      iframe.allow = 'clipboard-write';
      iframe.style.cssText = 'position:fixed;bottom:60px;left:20px;width:80px;height:80px;border:none;z-index:2147483647;background:transparent;transition:width 0.2s,height 0.2s;';
      iframe.setAttribute('allowtransparency', 'true');
      iframe.setAttribute('scrolling', 'no');
      document.body.appendChild(iframe);
      window.addEventListener('message', function(e) {
        if (!e.data || e.data.type !== 'betchat-resize') return;
        if (e.data.open) {
          iframe.style.width = '400px';
          iframe.style.height = '600px';
        } else {
          iframe.style.width = '80px';
          iframe.style.height = '80px';
        }
      });
    })();
  </script>
  <!-- Fim BetChat Widget -->
</body>

</html>
